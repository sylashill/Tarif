<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Tarif Defterim</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=Lora:wght@400;700&family=Nunito:wght@400;600;700&family=Merriweather:wght@400;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--dark:#1a1a2e;--cream:#faf8f5;--accent:#e8521a;--text:#1a1a2e;--muted:#888;--border:#eee;--card:#fff;--font:'DM Sans',sans-serif;}
html,body{height:100%;overflow:hidden;background:var(--dark);}
body{font-family:var(--font);color:var(--text);}
button{font-family:var(--font);}
textarea,input,select{font-family:var(--font);}

#app{height:100dvh;display:flex;flex-direction:column;background:var(--cream);overflow:hidden;}
.view{display:none;flex-direction:column;height:100%;}
.view.active{display:flex;}

/* TOP BAR */
.top-bar{background:var(--dark);padding:env(safe-area-inset-top,44px) 20px 16px;flex-shrink:0;}
.top-bar-inner{display:flex;justify-content:space-between;align-items:flex-end;}
.top-label{font-size:11px;color:#8888aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.top-count{font-family:'Playfair Display',serif;font-size:26px;color:#fff;}
.top-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fab{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,82,26,.5);}

/* SORT & SEARCH */
.sort-bar{display:flex;gap:6px;padding:10px 16px 0;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-chip{padding:6px 12px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:11px;cursor:pointer;white-space:nowrap;color:#666;transition:all .2s;font-weight:600;}
.sort-chip.active{background:var(--dark);color:#fff;border-color:var(--dark);}

.search-toggle{display:flex;margin:10px 16px 0;background:#f0edff;border-radius:12px;padding:3px;gap:3px;flex-shrink:0;}
.toggle-btn{flex:1;padding:8px;border:none;border-radius:10px;background:transparent;font-size:12px;cursor:pointer;color:#666;transition:all .2s;font-weight:500;}
.toggle-btn.active{background:#fff;color:#6c5ce7;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.1);}

.search-wrap{margin:8px 16px 0;background:#fff;border-radius:14px;display:flex;align-items:center;padding:0 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);flex-shrink:0;}
.search-icon{font-size:16px;margin-right:8px;}
.search-input{flex:1;border:none;outline:none;padding:12px 0;font-size:14px;background:transparent;color:#333;}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px 0;flex-shrink:0;}
.suggestion-chip{padding:4px 10px;background:#f0edff;border:none;border-radius:20px;font-size:12px;color:#6c5ce7;cursor:pointer;}
.ing-result{padding:4px 16px 0;font-size:12px;color:#888;font-style:italic;flex-shrink:0;}

/* CATEGORY TABS */
.cat-scroll{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;color:#666;transition:all .2s;font-weight:500;}
.cat-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}

/* RECIPE LIST */
.recipe-list{flex:1;overflow-y:auto;padding:4px 16px env(safe-area-inset-bottom,16px);}
.recipe-card{display:flex;align-items:center;background:var(--card);border-radius:16px;margin-bottom:10px;padding:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;overflow:hidden;transition:transform .1s;}
.recipe-card:active{transform:scale(.98);}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;}
.card-thumb{width:52px;height:52px;border-radius:12px;margin-right:14px;flex-shrink:0;object-fit:cover;}
.card-emoji-display{width:52px;height:52px;border-radius:12px;margin-right:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:15px;font-weight:600;color:var(--dark);margin-bottom:4px;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.card-cat{font-size:11px;font-weight:600;}
.card-dur,.card-serv{font-size:11px;color:var(--muted);}
.card-arrow{font-size:22px;font-weight:bold;margin-left:8px;}
.matched-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.matched-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:16px;color:#333;margin-bottom:8px;}
.empty-hint{font-size:13px;color:#aaa;}

/* DETAIL */
.detail-header{padding:calc(env(safe-area-inset-top,44px) + 12px) 20px 24px;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;}
.detail-thumb{width:80px;height:80px;border-radius:16px;object-fit:cover;margin-bottom:8px;}
.detail-emoji-display{font-size:56px;margin-bottom:8px;}
.detail-category{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.detail-title{font-size:26px;color:#fff;margin-bottom:12px;font-family:'Playfair Display',serif;}
.meta-badges{display:flex;gap:8px;flex-wrap:wrap;}
.meta-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;}
.detail-body{flex:1;overflow-y:auto;padding:20px 20px env(safe-area-inset-bottom,24px);}
.section{margin-bottom:20px;}
.section-title{font-size:11px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px;}
.ing-grid{display:flex;flex-wrap:wrap;gap:8px;}
.ing-tag{padding:6px 12px;border-radius:20px;border:1.5px solid;font-size:13px;font-weight:500;}

/* STEPS */
.steps-single{font-size:14px;line-height:1.8;color:#444;background:#f9f9f9;padding:14px;border-radius:12px;white-space:pre-wrap;}
.steps-list{list-style:none;padding:0;}
.steps-list li{display:flex;gap:12px;margin-bottom:12px;background:#f9f9f9;border-radius:12px;padding:12px;}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
.step-text{font-size:14px;line-height:1.65;color:#444;}

.note-box{background:#fffbf0;border-left:4px solid;border-radius:0 12px 12px 0;padding:14px;margin-bottom:20px;}
.note-label{font-size:10px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.note-text{font-size:14px;line-height:1.65;color:#555;font-style:italic;white-space:pre-wrap;}
.action-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
.edit-btn{flex:1;padding:13px;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;min-width:100px;}
.copy-btn{padding:13px 14px;border:2px solid #0984e3;border-radius:12px;background:transparent;color:#0984e3;font-size:14px;cursor:pointer;font-weight:600;}
.delete-btn{padding:13px 14px;border:2px solid #ff4757;border-radius:12px;background:transparent;color:#ff4757;font-size:14px;cursor:pointer;}

/* FORM */
.form-header{background:var(--dark);padding:calc(env(safe-area-inset-top,44px) + 4px) 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn2{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.form-title-text{color:#fff;font-size:18px;font-family:'Playfair Display',serif;}
.form-body{flex:1;overflow-y:auto;padding:16px 20px env(safe-area-inset-bottom,24px);}
.form-label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px;}
.form-hint{font-weight:400;text-transform:none;color:#aaa;letter-spacing:0;font-size:11px;}
.form-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none;color:#333;transition:border-color .2s;}
.form-input:focus{border-color:#6c5ce7;}
.form-select{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff;color:#333;}
.form-textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none;resize:vertical;color:#333;line-height:1.7;transition:border-color .2s;}
.form-textarea:focus{border-color:#6c5ce7;}
.row2{display:flex;gap:10px;}
.row2>div{flex:1;}

/* IMAGE PICKER */
.img-picker-area{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:4px;}
.img-picker-area:hover{border-color:#6c5ce7;}
.img-picker-preview{width:72px;height:72px;border-radius:12px;object-fit:cover;margin:0 auto 8px;display:block;}
.img-picker-text{font-size:13px;color:#888;}
.img-picker-hint{font-size:11px;color:#bbb;margin-top:4px;}
.emoji-or{text-align:center;font-size:12px;color:#bbb;margin:8px 0;}
.emoji-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.emoji-btn{width:40px;height:40px;font-size:22px;border:2px solid transparent;border-radius:10px;cursor:pointer;background:#f5f5f5;transition:all .15s;}
.emoji-btn.selected{background:#f0edff;border-color:#6c5ce7;}
.emoji-input-row{display:flex;gap:8px;align-items:center;margin-top:6px;}
.emoji-custom-input{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:22px;outline:none;text-align:center;}

/* FONT PICKER */
.font-row{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.font-opt{padding:10px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;background:#fff;text-align:left;transition:all .2s;font-size:15px;}
.font-opt.selected{border-color:#6c5ce7;background:#f0edff;}

/* CATEGORY MULTI SELECT */
.cat-multi{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.cat-opt{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;cursor:pointer;color:#666;transition:all .2s;font-weight:500;}
.cat-opt.selected{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
.add-cat-row{display:flex;gap:8px;margin-top:8px;}
.add-cat-input{flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none;}
.add-cat-btn{padding:8px 14px;background:#6c5ce7;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;}

/* STEPS MODE */
.steps-mode-toggle{display:flex;background:#f5f5f5;border-radius:10px;padding:3px;gap:3px;margin-top:6px;}
.steps-mode-btn{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:#666;transition:all .2s;font-weight:600;}
.steps-mode-btn.active{background:#fff;color:#1a1a2e;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.steps-list-editor{margin-top:8px;}
.step-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.step-num-badge{width:28px;height:28px;border-radius:50%;background:#1a1a2e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:8px;}
.step-input{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none;resize:vertical;line-height:1.6;}
.step-del{width:28px;height:28px;border-radius:50%;border:none;background:#ffecec;color:#ff4757;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:8px;}
.add-step-btn{width:100%;padding:10px;border:2px dashed var(--border);border-radius:10px;background:transparent;color:#888;font-size:13px;cursor:pointer;font-weight:600;margin-top:4px;}

/* COLOR ROW */
.color-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.color-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;outline:none;transition:transform .15s;}
.color-dot.selected{transform:scale(1.25);border-color:rgba(0,0,0,.25);}

.save-btn{width:100%;padding:15px;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:24px;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .2s;}
.save-btn:disabled{opacity:.4;cursor:not-allowed;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:24px;max-width:320px;width:100%;text-align:center;}
.modal h3{font-size:18px;margin-bottom:8px;}
.modal p{font-size:14px;color:#666;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.modal-cancel{flex:1;padding:12px;border:2px solid #eee;border-radius:12px;background:transparent;font-size:14px;cursor:pointer;}
.modal-confirm{flex:1;padding:12px;border:none;border-radius:12px;background:#ff4757;color:#fff;font-size:14px;cursor:pointer;font-weight:600;}

/* TOAST */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,16px) + 16px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* SETTINGS MODAL */
.settings-modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px env(safe-area-inset-bottom,24px);max-width:480px;width:100%;margin-top:auto;}
.settings-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.settings-section{margin-bottom:20px;}
.settings-section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.font-grid{display:flex;flex-direction:column;gap:8px;}
.font-pick{padding:12px 14px;border:2px solid var(--border);border-radius:12px;cursor:pointer;background:#fff;text-align:left;transition:all .2s;}
.font-pick.selected{border-color:#6c5ce7;background:#f0edff;}
.font-pick-name{font-size:13px;font-weight:600;color:#333;margin-bottom:2px;}
.font-pick-sample{font-size:16px;color:#555;}

.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
.settings-overlay.open{display:flex;}
</style>
</head>
<body>
<div id="app">

<!-- LIST VIEW -->
<div id="view-list" class="view active">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div>
        <div class="top-label">Tarif Defterim</div>
        <div class="top-count" id="recipe-count">0 tarif</div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" onclick="openSettings()" title="Ayarlar">⚙️</button>
        <button class="fab" onclick="openAddView()">+</button>
      </div>
    </div>
  </div>

  <div class="sort-bar">
    <button class="sort-chip active" id="sort-date" onclick="setSort('date',this)">🕐 En Yeni</button>
    <button class="sort-chip" id="sort-alpha" onclick="setSort('alpha',this)">🔤 Alfabetik</button>
    <button class="sort-chip" id="sort-cat" onclick="setSort('cat',this)">📂 Kategori</button>
  </div>

  <div class="search-toggle">
    <button class="toggle-btn active" id="btn-search-name" onclick="setSearchMode('name')">🔍 Tarif Ara</button>
    <button class="toggle-btn" id="btn-search-ing" onclick="setSearchMode('ingredient')">🧂 Malzemeye Göre</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon" id="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="Tarif ara..." oninput="onSearch(this.value)">
  </div>
  <div class="suggestions" id="suggestions"></div>
  <div class="ing-result" id="ing-result"></div>

  <div class="cat-scroll" id="cat-scroll"></div>
  <div class="recipe-list" id="recipe-list"></div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" class="view">
  <div class="detail-header" id="detail-header">
    <button class="back-btn" onclick="showView('list')">←</button>
    <div id="detail-thumb-wrap"></div>
    <div class="detail-category" id="detail-category"></div>
    <h1 class="detail-title" id="detail-title"></h1>
    <div class="meta-badges" id="detail-meta"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- ADD/EDIT VIEW -->
<div id="view-form" class="view">
  <div class="form-header">
    <button class="back-btn2" onclick="cancelForm()">←</button>
    <div class="form-title-text" id="form-title">Yeni Tarif</div>
  </div>
  <div class="form-body">

    <label class="form-label">Görsel / Emoji</label>
    <div class="img-picker-area" id="img-picker-area" onclick="document.getElementById('img-file-input').click()">
      <div id="img-preview-wrap">
        <div style="font-size:36px;margin-bottom:6px">📷</div>
        <div class="img-picker-text">Fotoğraf seç</div>
        <div class="img-picker-hint">veya aşağıdan emoji seç</div>
      </div>
    </div>
    <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="onImageSelect(this)">
    <div class="emoji-or">— ya da emoji seç —</div>
    <div class="emoji-row" id="emoji-row"></div>
    <div class="emoji-input-row">
      <input class="emoji-custom-input" id="custom-emoji-input" placeholder="✏️ veya herhangi bir emoji yaz" maxlength="2" oninput="setCustomEmoji(this.value)">
    </div>

    <label class="form-label">Tarif Adı</label>
    <input class="form-input" id="f-name" placeholder="örn: Mercimek Çorbası" oninput="updateSaveBtn()">

    <label class="form-label">Kategoriler <span class="form-hint">(birden fazla seçebilirsin)</span></label>
    <div class="cat-multi" id="cat-multi"></div>
    <div class="add-cat-row">
      <input class="add-cat-input" id="new-cat-input" placeholder="+ Yeni kategori ekle" onkeydown="if(event.key==='Enter')addCustomCat()">
      <button class="add-cat-btn" onclick="addCustomCat()">Ekle</button>
    </div>

    <div class="row2">
      <div>
        <label class="form-label">Süre</label>
        <input class="form-input" id="f-duration" placeholder="30 dk">
      </div>
      <div>
        <label class="form-label">Kaç Kişilik</label>
        <input class="form-input" id="f-servings" type="number" min="1" value="2">
      </div>
    </div>

    <label class="form-label">Malzemeler <span class="form-hint">(virgülle ayır)</span></label>
    <textarea class="form-textarea" id="f-ingredients" rows="3" placeholder="un, yumurta, şeker, tereyağı..."></textarea>

    <label class="form-label">Yapılış</label>
    <div class="steps-mode-toggle">
      <button class="steps-mode-btn active" id="steps-mode-single" onclick="setStepsMode('single')">📝 Tek Metin</button>
      <button class="steps-mode-btn" id="steps-mode-list" onclick="setStepsMode('list')">📋 Adım Adım</button>
    </div>
    <div id="steps-single-editor">
      <textarea class="form-textarea" id="f-steps-single" rows="5" placeholder="Tarifi buraya yaz...&#10;&#10;Enter ile satır arası boşluk bırakabilirsin." style="margin-top:8px;"></textarea>
    </div>
    <div id="steps-list-editor" style="display:none">
      <div class="steps-list-editor" id="steps-steps-list"></div>
      <button class="add-step-btn" onclick="addStepRow()">+ Adım Ekle</button>
    </div>

    <label class="form-label">📝 Notlarım</label>
    <textarea class="form-textarea" id="f-notes" rows="3" placeholder="Püf noktaları, değişiklikler, tavsiyeler..."></textarea>

    <label class="form-label">Renk</label>
    <div class="color-row" id="color-row"></div>

    <button class="save-btn" id="save-btn" onclick="saveRecipe()" disabled>Tarifi Kaydet ✓</button>
  </div>
</div>

</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Tarifi Sil</h3>
    <p>Bu tarifi silmek istediğine emin misin?</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeDeleteModal()">İptal</button>
      <button class="modal-confirm" onclick="confirmDelete()">Sil</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-modal">
    <div class="settings-title">⚙️ Ayarlar</div>
    <div class="settings-section">
      <div class="settings-section-label">Yazı Tipi</div>
      <div class="font-grid" id="font-grid"></div>
    </div>
    <button style="width:100%;padding:13px;border:none;border-radius:12px;background:#1a1a2e;color:#fff;font-size:15px;font-weight:700;cursor:pointer;" onclick="closeSettings()">Tamam</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONSTANTS =====
const COLORS=['#e8521a','#d4a017','#4a7c59','#6c5ce7','#e84393','#0984e3','#00b894','#c0392b','#8e44ad','#2c3e50','#16a085','#d35400'];
const EMOJIS=['🍲','🍗','🫘','🥗','🍰','🥘','🍝','🥞','🍜','🫕','🥙','🍱','🥧','🍕','🥩','🥦','🍳','☕','🧁','🥐','🫙','🥣','🍛','🫔'];
const FONTS=[
  {id:'dm',name:'DM Sans',sample:'Modern & temiz',css:"'DM Sans',sans-serif"},
  {id:'playfair',name:'Playfair Display',sample:'Klasik & zarif',css:"'Playfair Display',serif"},
  {id:'lora',name:'Lora',sample:'Sıcak & okunabilir',css:"'Lora',serif"},
  {id:'nunito',name:'Nunito',sample:'Yuvarlak & arkadaşça',css:"'Nunito',sans-serif"},
  {id:'merriweather',name:'Merriweather',sample:'Gazete stili',css:"'Merriweather',serif"},
  {id:'raleway',name:'Raleway',sample:'Şık & geometrik',css:"'Raleway',sans-serif"},
];
const DEFAULT_CATS=['Çorba','Ana Yemek','Zeytinyağlı','Tatlı','Kahvaltı','Salata','Atıştırmalık'];

// ===== STATE =====
let recipes=[], customCats=[], settings={font:'dm'};
let activeCategory='Tümü', searchMode='name', searchQuery='', sortMode='date';
let selectedId=null, editingId=null;
let selectedEmoji='🍽️', selectedColor=COLORS[0], selectedImage=null;
let selectedCats=[], stepsMode='single', stepRows=[];
let deleteTargetId=null;

// ===== STORAGE (IndexedDB for images, localStorage for data) =====
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('tarif-defteri',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('images');};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej();
  });
}
function saveImage(id,blob){
  return new Promise((res)=>{
    if(!db){res();return;}
    const tx=db.transaction('images','readwrite');
    tx.objectStore('images').put(blob,String(id));
    tx.oncomplete=()=>res();
    tx.onerror=()=>res();
  });
}
function getImage(id){
  return new Promise((res)=>{
    if(!db){res(null);return;}
    const tx=db.transaction('images','readonly');
    const req=tx.objectStore('images').get(String(id));
    req.onsuccess=()=>res(req.result||null);
    req.onerror=()=>res(null);
  });
}
function deleteImage(id){
  if(!db)return;
  const tx=db.transaction('images','readwrite');
  tx.objectStore('images').delete(String(id));
}

function loadData(){
  try{
    const r=localStorage.getItem('tarif-v2');
    recipes=r?JSON.parse(r):getDefaultRecipes();
    const c=localStorage.getItem('tarif-cats');
    customCats=c?JSON.parse(c):[];
    const s=localStorage.getItem('tarif-settings');
    if(s)settings=JSON.parse(s);
  }catch(e){recipes=getDefaultRecipes();customCats=[];settings={font:'dm'};}
}
function saveData(){
  try{
    localStorage.setItem('tarif-v2',JSON.stringify(recipes));
    localStorage.setItem('tarif-cats',JSON.stringify(customCats));
    localStorage.setItem('tarif-settings',JSON.stringify(settings));
  }catch(e){}
}

function getDefaultRecipes(){
  return [
    {id:1,name:'Mercimek Çorbası',categories:['Çorba'],duration:'30 dk',servings:4,ingredients:['kırmızı mercimek','soğan','sarımsak','havuç','tereyağı','kimyon','tuz','biber'],notes:'Pişirdikten sonra blenderdan geçir.\n\nÜzerine tereyağında kızdırılmış kırmızı biber gezdirince harika oluyor.',stepsMode:'list',stepsText:'',stepsArray:['Mercimeği yıkayın, soğan ve havucu küp küp doğrayın.','Tencerede tereyağını eritin, soğanları kavurun.','Havuç ve sarımsağı ekleyin, 2 dk daha kavurun.','Mercimek, su ve baharatları ekleyin. 20 dk kısık ateşte pişirin.','Blenderdan geçirip servis edin.'],image:'🍲',color:'#e8521a',hasImage:false,addedAt:Date.now()-3000},
    {id:2,name:'Fırın Tavuk',categories:['Ana Yemek'],duration:'1 sa 20 dk',servings:4,ingredients:['tavuk','sarımsak','zeytinyağı','kekik','biberiye','limon','tuz','karabiber'],notes:'Tavuğu marine ederek gece bekletirsen çok daha lezzetli olur.',stepsMode:'single',stepsText:'Tavuğu tüm baharatlarla marine edin.\n\nEn az 30 dk bekletin, mümkünse gece boyunca.\n\nFırını 200 dereceye ısıtın. Tavuğu fırın tepsisine dizin.\n\n1 saat pişirin, 45. dakikada üzerini açın.',stepsArray:[],image:'🍗',color:'#d4a017',hasImage:false,addedAt:Date.now()-2000},
    {id:3,name:'Zeytinyağlı Fasulye',categories:['Zeytinyağlı'],duration:'45 dk',servings:6,ingredients:['taze fasulye','domates','soğan','sarımsak','zeytinyağı','tuz','şeker'],notes:'Soğuyunca daha güzel oluyor.\n\nYanında pilav veya ekmekle servis et.',stepsMode:'single',stepsText:'Fasulyeyi ayıklayın ve yıkayın.\n\nSoğanı zeytinyağında kavurun.\n\nDomatesin derisi soyulup küçük doğranmış hali ile ekleyin.\n\nFasulyeyi ekleyin, kısık ateşte 30 dk pişirin.',stepsArray:[],image:'🫘',color:'#4a7c59',hasImage:false,addedAt:Date.now()-1000}
  ];
}

// ===== INIT =====
async function init(){
  await openDB();
  loadData();
  applyFont();
  buildCategoryTabs();
  buildEmojiRow();
  buildColorRow();
  buildFontGrid();
  renderList();
}

function applyFont(){
  const f=FONTS.find(x=>x.id===settings.font)||FONTS[0];
  document.documentElement.style.setProperty('--font',f.css);
  document.querySelectorAll('button,input,textarea,select').forEach(el=>el.style.fontFamily=f.css);
}

// ===== SETTINGS =====
function openSettings(){
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){
  document.getElementById('settings-overlay').classList.remove('open');
}
function buildFontGrid(){
  document.getElementById('font-grid').innerHTML=FONTS.map(f=>`
    <div class="font-pick${settings.font===f.id?' selected':''}" onclick="pickFont('${f.id}')">
      <div class="font-pick-name">${f.name}</div>
      <div class="font-pick-sample" style="font-family:${f.css}">${f.sample}</div>
    </div>
  `).join('');
}
function pickFont(id){
  settings.font=id;
  saveData();
  applyFont();
  buildFontGrid();
}

// ===== CATEGORIES =====
function getAllCats(){return['Tümü',...DEFAULT_CATS,...customCats];}
function buildCategoryTabs(){
  const cats=getAllCats();
  document.getElementById('cat-scroll').innerHTML=cats.map(c=>`
    <button class="cat-btn${c===activeCategory?' active':''}" onclick="setCategory('${c}',this)">${c}</button>
  `).join('');
}
function setCategory(cat,el){
  activeCategory=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderList();
}

// ===== SORT =====
function setSort(mode,el){
  sortMode=mode;
  document.querySelectorAll('.sort-chip').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderList();
}

// ===== SEARCH =====
function setSearchMode(mode){
  searchMode=mode;
  searchQuery='';
  document.getElementById('search-input').value='';
  document.getElementById('search-input').placeholder=mode==='name'?'Tarif ara...':'Malzeme yaz... (örn: sarımsak)';
  document.getElementById('search-icon').textContent=mode==='name'?'🔍':'🧂';
  document.getElementById('btn-search-name').classList.toggle('active',mode==='name');
  document.getElementById('btn-search-ing').classList.toggle('active',mode==='ingredient');
  document.getElementById('suggestions').innerHTML='';
  document.getElementById('ing-result').textContent='';
  renderList();
}
function onSearch(val){
  searchQuery=val;
  if(searchMode==='ingredient'&&val.trim()){
    const q=val.toLowerCase();
    const all=[...new Set(recipes.flatMap(r=>r.ingredients))];
    const matches=all.filter(i=>i.toLowerCase().includes(q)).slice(0,6);
    document.getElementById('suggestions').innerHTML=matches.map(m=>`<button class="suggestion-chip" onclick="selectSuggestion('${m}')">${m}</button>`).join('');
  }else{
    document.getElementById('suggestions').innerHTML='';
    document.getElementById('ing-result').textContent='';
  }
  renderList();
}
function selectSuggestion(val){
  document.getElementById('search-input').value=val;
  searchQuery=val;
  document.getElementById('suggestions').innerHTML='';
  renderList();
}

// ===== FILTER & SORT =====
function getFiltered(){
  let list=[...recipes];
  if(activeCategory!=='Tümü')list=list.filter(r=>(r.categories||[r.category]).includes(activeCategory));
  if(searchMode==='ingredient'&&searchQuery.trim()){
    const q=searchQuery.toLowerCase();
    list=list.filter(r=>r.ingredients.some(i=>i.toLowerCase().includes(q)));
  }else if(searchMode==='name'&&searchQuery.trim()){
    const q=searchQuery.toLowerCase();
    list=list.filter(r=>r.name.toLowerCase().includes(q));
  }
  if(sortMode==='alpha')list.sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  else if(sortMode==='cat')list.sort((a,b)=>{const ca=(a.categories||[a.category])[0]||'';const cb=(b.categories||[b.category])[0]||'';return ca.localeCompare(cb,'tr')||a.name.localeCompare(b.name,'tr');});
  else list.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  return list;
}

// ===== RENDER LIST =====
async function renderList(){
  const filtered=getFiltered();
  document.getElementById('recipe-count').textContent=recipes.length+' tarif';
  if(searchMode==='ingredient'&&searchQuery.trim()){
    document.getElementById('ing-result').textContent=`"${searchQuery}" içeren ${filtered.length} tarif`;
  }else{
    document.getElementById('ing-result').textContent='';
  }
  const el=document.getElementById('recipe-list');
  if(filtered.length===0){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">${searchQuery?'Sonuç bulunamadı':'Henüz tarif yok'}</div><div class="empty-hint">Sağ üstteki + ile ekleyebilirsin</div></div>`;
    return;
  }
  // Render cards, then load images async
  el.innerHTML=filtered.map(r=>{
    const cats=(r.categories||[r.category]).join(', ');
    const matched=searchMode==='ingredient'&&searchQuery?r.ingredients.filter(i=>i.toLowerCase().includes(searchQuery.toLowerCase())):[];
    const matchedHtml=matched.map(m=>`<span class="matched-tag" style="background:${r.color}22;color:${r.color}">✓ ${m}</span>`).join('');
    const thumbHtml=r.hasImage
      ?`<img class="card-thumb" id="card-thumb-${r.id}" src="" style="background:#eee">`
      :`<div class="card-emoji-display" style="background:${r.color}18">${r.image||'🍽️'}</div>`;
    return `<div class="recipe-card" onclick="openDetail(${r.id})">
      <div class="card-accent" style="background:${r.color}"></div>
      ${thumbHtml}
      <div class="card-info">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">
          <span class="card-cat" style="color:${r.color}">${cats}</span>
          ${r.duration?`<span class="card-dur">⏱ ${r.duration}</span>`:''}
          <span class="card-serv">👥 ${r.servings} kişi</span>
        </div>
        ${matched.length?`<div class="matched-row">${matchedHtml}</div>`:''}
      </div>
      <div class="card-arrow" style="color:${r.color}">›</div>
    </div>`;
  }).join('');
  // Load images
  for(const r of filtered){
    if(r.hasImage){
      const blob=await getImage(r.id);
      if(blob){
        const url=URL.createObjectURL(blob);
        const img=document.getElementById('card-thumb-'+r.id);
        if(img)img.src=url;
      }
    }
  }
}

// ===== DETAIL =====
async function openDetail(id){
  selectedId=id;
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  const cats=(r.categories||[r.category]).join(' · ');
  document.getElementById('detail-header').style.background=r.color;
  document.getElementById('detail-category').textContent=cats;
  document.getElementById('detail-title').textContent=r.name;
  document.getElementById('detail-meta').innerHTML=[
    r.duration?`<span class="meta-badge">⏱ ${r.duration}</span>`:'',
    `<span class="meta-badge">👥 ${r.servings} kişilik</span>`
  ].join('');

  // thumb
  const tw=document.getElementById('detail-thumb-wrap');
  if(r.hasImage){
    const blob=await getImage(r.id);
    if(blob){
      const url=URL.createObjectURL(blob);
      tw.innerHTML=`<img class="detail-thumb" src="${url}">`;
    }else{
      tw.innerHTML=`<div class="detail-emoji-display">${r.image||'🍽️'}</div>`;
    }
  }else{
    tw.innerHTML=`<div class="detail-emoji-display">${r.image||'🍽️'}</div>`;
  }

  // steps
  let stepsHtml='';
  const sm=r.stepsMode||'single';
  if(sm==='list'&&r.stepsArray&&r.stepsArray.length){
    const items=r.stepsArray.map((s,i)=>`<li><div class="step-num" style="background:${r.color}">${i+1}</div><div class="step-text">${s}</div></li>`).join('');
    stepsHtml=`<div class="section"><div class="section-title" style="color:${r.color}">📋 Yapılış</div><ul class="steps-list">${items}</ul></div>`;
  }else if(r.stepsText){
    stepsHtml=`<div class="section"><div class="section-title" style="color:${r.color}">📋 Yapılış</div><p class="steps-single">${r.stepsText}</p></div>`;
  }

  const notesHtml=r.notes?`<div class="note-box" style="border-left-color:${r.color}"><div class="note-label">📝 Notlarım</div><p class="note-text">${r.notes}</p></div>`:'';
  const ingHtml=r.ingredients.map(i=>`<span class="ing-tag" style="border-color:${r.color}55;color:${r.color}">${i}</span>`).join('');

  document.getElementById('detail-body').innerHTML=`
    <div class="section">
      <div class="section-title" style="color:${r.color}">🧂 Malzemeler</div>
      <div class="ing-grid">${ingHtml}</div>
    </div>
    ${stepsHtml}
    ${notesHtml}
    <div class="action-row">
      <button class="edit-btn" style="background:${r.color}" onclick="openEditView(${r.id})">✏️ Düzenle</button>
      <button class="copy-btn" onclick="copyRecipe(${r.id})">📋 Kopyala</button>
      <button class="delete-btn" onclick="openDeleteModal(${r.id})">🗑️</button>
    </div>
  `;
  showView('detail');
}

// ===== COPY =====
async function copyRecipe(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  const newId=Date.now();
  const copy={...r,id:newId,name:r.name+' (kopya)',addedAt:newId};
  recipes=[copy,...recipes];
  if(r.hasImage){
    const blob=await getImage(r.id);
    if(blob)await saveImage(newId,blob);
  }
  saveData();
  showToast('Tarif kopyalandı!');
  renderList();
}

// ===== FORM =====
function openAddView(){
  editingId=null;selectedEmoji='🍽️';selectedColor=COLORS[0];selectedImage=null;selectedCats=[];stepsMode='single';stepRows=[];
  document.getElementById('form-title').textContent='Yeni Tarif';
  clearForm();
  buildEmojiRow();buildColorRow();buildCatMulti();setStepsMode('single');
  updateSaveBtn();
  showView('form');
}
function openEditView(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  editingId=id;selectedEmoji=r.image||'🍽️';selectedColor=r.color;selectedImage=null;
  selectedCats=[...(r.categories||[r.category])];stepsMode=r.stepsMode||'single';
  stepRows=r.stepsArray?[...r.stepsArray]:[];
  document.getElementById('form-title').textContent='Tarifi Düzenle';
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-duration').value=r.duration||'';
  document.getElementById('f-servings').value=r.servings;
  document.getElementById('f-ingredients').value=r.ingredients.join(', ');
  document.getElementById('f-steps-single').value=r.stepsText||'';
  document.getElementById('f-notes').value=r.notes||'';
  document.getElementById('save-btn').textContent='Değişiklikleri Kaydet ✓';
  buildEmojiRow();buildColorRow();buildCatMulti();setStepsMode(stepsMode);buildStepRows();
  updateImagePreview(r);
  updateSaveBtn();
  showView('form');
}
function clearForm(){
  ['f-name','f-duration','f-ingredients','f-steps-single','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-servings').value='2';
  document.getElementById('save-btn').textContent='Tarifi Kaydet ✓';
  resetImagePreview();
}
function cancelForm(){
  if(editingId){openDetail(editingId);}else{showView('list');renderList();}
}

// IMAGE
function onImageSelect(input){
  const file=input.files[0];if(!file)return;
  selectedImage=file;selectedEmoji='';
  const url=URL.createObjectURL(file);
  document.getElementById('img-preview-wrap').innerHTML=`<img class="img-picker-preview" src="${url}"><div class="img-picker-text" style="font-size:12px;color:#888">Değiştirmek için tekrar dokun</div>`;
  buildEmojiRow();
}
function resetImagePreview(){
  selectedImage=null;
  document.getElementById('img-preview-wrap').innerHTML=`<div style="font-size:36px;margin-bottom:6px">📷</div><div class="img-picker-text">Fotoğraf seç</div><div class="img-picker-hint">veya aşağıdan emoji seç</div>`;
}
async function updateImagePreview(r){
  if(r.hasImage){
    const blob=await getImage(r.id);
    if(blob){
      const url=URL.createObjectURL(blob);
      document.getElementById('img-preview-wrap').innerHTML=`<img class="img-picker-preview" src="${url}"><div class="img-picker-text" style="font-size:12px;color:#888">Değiştirmek için dokun</div>`;
      return;
    }
  }
  resetImagePreview();
}

// EMOJI
function buildEmojiRow(){
  document.getElementById('emoji-row').innerHTML=EMOJIS.map(e=>`<button class="emoji-btn${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</button>`).join('');
  document.getElementById('custom-emoji-input').value='';
}
function selectEmoji(e){selectedEmoji=e;selectedImage=null;resetImagePreview();buildEmojiRow();}
function setCustomEmoji(val){if(val.trim()){selectedEmoji=val.trim();selectedImage=null;buildEmojiRow();}}

// COLORS
function buildColorRow(){
  document.getElementById('color-row').innerHTML=COLORS.map(c=>`<button class="color-dot${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></button>`).join('');
  document.getElementById('save-btn').style.background=selectedColor;
}
function selectColor(c){selectedColor=c;buildColorRow();}

// CATEGORIES MULTI
function buildCatMulti(){
  const all=[...DEFAULT_CATS,...customCats];
  document.getElementById('cat-multi').innerHTML=all.map(c=>`<button class="cat-opt${selectedCats.includes(c)?' selected':''}" onclick="toggleCat('${c}')">${c}</button>`).join('');
}
function toggleCat(c){
  if(selectedCats.includes(c))selectedCats=selectedCats.filter(x=>x!==c);
  else selectedCats.push(c);
  buildCatMulti();
}
function addCustomCat(){
  const inp=document.getElementById('new-cat-input');
  const val=inp.value.trim();
  if(!val)return;
  if(!customCats.includes(val)&&!DEFAULT_CATS.includes(val)){
    customCats.push(val);
    saveData();
    buildCategoryTabs();
  }
  if(!selectedCats.includes(val))selectedCats.push(val);
  inp.value='';
  buildCatMulti();
}

// STEPS MODE
function setStepsMode(mode){
  stepsMode=mode;
  document.getElementById('steps-mode-single').classList.toggle('active',mode==='single');
  document.getElementById('steps-mode-list').classList.toggle('active',mode==='list');
  document.getElementById('steps-single-editor').style.display=mode==='single'?'block':'none';
  document.getElementById('steps-list-editor').style.display=mode==='list'?'block':'none';
}
function buildStepRows(){
  const container=document.getElementById('steps-steps-list');
  container.innerHTML=stepRows.map((s,i)=>`
    <div class="step-row" id="step-row-${i}">
      <div class="step-num-badge">${i+1}</div>
      <textarea class="step-input" rows="2" oninput="stepRows[${i}]=this.value" placeholder="Adım ${i+1}...">${s}</textarea>
      <button class="step-del" onclick="removeStep(${i})">×</button>
    </div>
  `).join('');
}
function addStepRow(){stepRows.push('');buildStepRows();}
function removeStep(i){stepRows.splice(i,1);buildStepRows();}

function updateSaveBtn(){
  const btn=document.getElementById('save-btn');
  btn.disabled=!document.getElementById('f-name').value.trim();
  btn.style.background=selectedColor;
}

// ===== SAVE =====
async function saveRecipe(){
  const name=document.getElementById('f-name').value.trim();if(!name)return;
  const id=editingId||Date.now();
  const hasImage=!!(selectedImage||(editingId&&recipes.find(r=>r.id===editingId)?.hasImage&&!selectedImage===false));
  // Determine image
  let willHaveImage=false;
  if(selectedImage){willHaveImage=true;await saveImage(id,selectedImage);}
  else if(editingId){const old=recipes.find(r=>r.id===editingId);willHaveImage=old?.hasImage||false;}

  const recipe={
    id,name,
    categories:selectedCats.length?selectedCats:['Genel'],
    duration:document.getElementById('f-duration').value.trim(),
    servings:parseInt(document.getElementById('f-servings').value)||2,
    ingredients:document.getElementById('f-ingredients').value.split(',').map(s=>s.trim()).filter(Boolean),
    stepsMode,
    stepsText:stepsMode==='single'?document.getElementById('f-steps-single').value.trim():'',
    stepsArray:stepsMode==='list'?[...stepRows].filter(s=>s.trim()):[],
    notes:document.getElementById('f-notes').value.trim(),
    image:selectedEmoji||'🍽️',
    color:selectedColor,
    hasImage:willHaveImage,
    addedAt:editingId?(recipes.find(r=>r.id===editingId)?.addedAt||Date.now()):id
  };
  if(editingId)recipes=recipes.map(r=>r.id===editingId?recipe:r);
  else recipes=[recipe,...recipes];
  saveData();
  selectedId=id;
  openDetail(id);
  renderList();
}

// ===== DELETE =====
function openDeleteModal(id){deleteTargetId=id;document.getElementById('delete-modal').classList.add('open');}
function closeDeleteModal(){deleteTargetId=null;document.getElementById('delete-modal').classList.remove('open');}
function confirmDelete(){
  if(!deleteTargetId)return;
  const r=recipes.find(x=>x.id===deleteTargetId);
  if(r?.hasImage)deleteImage(r.id);
  recipes=recipes.filter(r=>r.id!==deleteTargetId);
  saveData();closeDeleteModal();showView('list');renderList();
}

// ===== VIEW =====
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='list')renderList();
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
